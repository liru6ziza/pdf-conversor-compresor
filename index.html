<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convertidor y Compresor de PDF Gratis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f4f4f4; margin: 0; }
    h1 { color: #2c3e50; }
    .container { max-width: 700px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 0 25px rgba(0,0,0,0.15); }
    input, select, button { padding: 14px; margin: 12px; font-size: 17px; border-radius: 6px; border: 1px solid #ccc; width: 80%; max-width: 500px; box-sizing: border-box; }
    button { background: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #c0392b; }
    #result { margin-top: 30px; font-size: 18px; color: #27ae60; }
    #loading { display: none; margin-top: 20px; font-size: 20px; color: #3498db; }
    .ad-space { margin: 40px auto; height: 100px; background: #eee; border: 1px dashed #aaa; line-height: 100px; font-size: 18px; color: #777; max-width: 728px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Convertidor y Compresor de PDF</h1>
    <p>Sube tu archivo (imagen o Word) y conviértelo a PDF gratis</p>

    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp,.doc,.docx">
    <br>
    <select id="format">
      <option value="pdf">Convertir a PDF</option>
      <option value="compress">Comprimir PDF (próximamente)</option>
    </select>
    <br>
    <button onclick="procesar()">Procesar archivo</button>

    <div id="loading">Procesando... por favor espera</div>
    <div id="result"></div>

    <div class="ad-space">[Aquí irá pop-up o interstitial antes de descargar]</div>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    // ←←← PEGA AQUÍ TU API KEY DE CLOUDCONVERT ←←←
    const CLOUDCONVERT_API_KEY = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJhdWQiOiIxIiwianRpIjoiMzVhYWFmMjZjM2I0ODFkZDJkYzdhNjQ0NjRmZjIwZWI5Zjk4OWI3NDljZDQzNGEzZjMxOTFiZmNlOGU5YTAyYjI4OTlmYjJhODQ5NzIyZWIiLCJpYXQiOjE3NzIzNTU0NDIuNDg2ODgxLCJuYmYiOjE3NzIzNTU0NDIuNDg2ODgzLCJleHAiOjQ5MjgwMjkwNDIuNDgwNTI0LCJzdWIiOiI3NDUxMjc0MCIsInNjb3BlcyI6WyJ1c2VyLnJlYWQiLCJ1c2VyLndyaXRlIiwidGFzay5yZWFkIiwidGFzay53cml0ZSIsIndlYmhvb2sucmVhZCIsIndlYmhvb2sud3JpdGUiLCJwcmVzZXQucmVhZCIsInByZXNldC53cml0ZSJdfQ.er45ufA4YacR4M3CP5jwsR6N_6hhsPiSGr74--OuerWHk-n81EOF7foKWdvblMJ8S_7qAnfvSY1r-AvPw55HSRxFBSwHUVWqGCPkWRrG4DLTLYpRDrcD9tqnCNwXAmyfqMEXHzyW_1AdbPxehdy92HZi9kQifb9MURRl-llF0eZEHUbfmcKAwMcdP8Lgj-C6uGIxpuHsNkBKc7V05iKSZHyosqBtWV-AsxtGjK7vtChWdp_0Qw1PygmfW_lUKBHO7lE8GC0lJiNq6hlDCHDjRfWiR69HOVfeskPtSsp8pEKWjzH-oXF76T21Z0OTaXtQ7aeSQzOagLaKtvvzk0a7C8Cfd-Gk6ASZLjZ-Zi8JibKvmV8RqfF8vfeBhaGKKEpkUZcZhrw1EYbK0fe1U4qe_XCMFg8lOyEfM_YzqGxL38XMwY18SQzw3OBO0sNFxQJgp526U9wREbwk3DkrzqmiVpJ4NWZeHqdzxCaUj-IFIM_y_Jp9ZZR_xdpz0iXuLHkL61wHDEyZGUVwgSzNFNopGm_AlhhFDW9KJXBBV2PH4jmwNmG3xC6rDCjrhw3Lh6kcuXGLOn0fm9imJrOSj-V_-Klc-EHH4UdSIDZvfinsVTwJ-ArhCXIHV7cq0Nmrs-jQJXe4Q99UwbLLO9okAe6FsCjXWEUXcl5O6LU8GzTUEPY';

    async function procesar() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) {
        alert("Selecciona un archivo primero");
        return;
      }

      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').innerHTML = '';

      const format = document.getElementById('format').value;

      if (format === 'pdf') {
        if (file.type.startsWith('image/')) {
          // Imagen → PDF (jsPDF)
          const reader = new FileReader();
          reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
              const pdf = new jsPDF({
                orientation: img.width > img.height ? 'landscape' : 'portrait',
                unit: 'px',
                format: [img.width, img.height]
              });
              pdf.addImage(e.target.result, file.type.split('/')[1].toUpperCase(), 0, 0, img.width, img.height);
              pdf.save('convertido.pdf');
              document.getElementById('loading').style.display = 'none';
              document.getElementById('result').innerHTML = '¡Descargado! Revisa tu carpeta de descargas.';
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        } 
        else if (file.name.endsWith('.doc') || file.name.endsWith('.docx')) {
          // Word → PDF con CloudConvert
          try {
            const formData = new FormData();
            formData.append('file', file);

            const uploadRes = await fetch('https://api.cloudconvert.com/v2/import/upload', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${CLOUDCONVERT_API_KEY}` },
              body: formData
            });
            const uploadData = await uploadRes.json();
            const taskId = uploadData.data.id;

            const jobRes = await fetch('https://api.cloudconvert.com/v2/jobs', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${CLOUDCONVERT_API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                tasks: {
                  'import-1': { operation: 'import/upload', file_id: taskId },
                  'convert-1': { operation: 'convert', input: 'import-1', output_format: 'pdf' },
                  'export-1': { operation: 'export/url', input: 'convert-1' }
                }
              })
            });
            const jobData = await jobRes.json();
            const jobId = jobData.data.id;

            let status = 'waiting';
            let exportUrl = '';
            while (status !== 'finished') {
              await new Promise(r => setTimeout(r, 3000));
              const statusRes = await fetch(`https://api.cloudconvert.com/v2/jobs/${jobId}`, {
                headers: { 'Authorization': `Bearer ${CLOUDCONVERT_API_KEY}` }
              });
              const statusData = await statusRes.json();
              status = statusData.data.status;
              if (status === 'finished') {
                exportUrl = statusData.data.tasks.find(t => t.name === 'export-1').result.files[0].url;
              }
            }

            window.location.href = exportUrl;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').innerHTML = '¡Descargado!';
          } catch (err) {
            alert("Error en la conversión: " + err.message);
            document.getElementById('loading').style.display = 'none';
          }
        } else {
          alert("Solo imágenes y archivos Word por ahora.");
          document.getElementById('loading').style.display = 'none';
        }
      } else {
        alert("Compresor de PDF próximamente.");
        document.getElementById('loading').style.display = 'none';
      }
    }
  </script>
</body>
</html>
